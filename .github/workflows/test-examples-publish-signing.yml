# Run Examples make test-publish-signing: local registry, signing, publish, consume.
# Requires: Swift, Go (registry), checkout with submodules.
name: Test Examples (publish with signing)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-publish-signing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Examples make test-publish-signing
        run: make -C Examples test-publish-signing
