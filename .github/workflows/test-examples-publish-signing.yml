# Run Examples make test-publish-signing: local registry, signing, publish, consume.
# Runs inside Docker (docker-compose.ci.yml) to avoid cleanup issues on the runner.
name: Test Examples (publish with signing)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-publish-signing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and run CI in Docker
        run: |
          docker compose -f docker-compose.ci.yml build --no-cache ci
          docker compose -f docker-compose.ci.yml run --rm ci
